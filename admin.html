<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - المنصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: #f0f2f5;
        }
        .sidebar {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar .nav-link {
            color: #cbd5e1;
            padding: 12px 20px;
            margin: 5px 10px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: #fb873f;
            color: white;
            transform: translateX(-5px);
        }
        .sidebar .nav-link i {
            margin-left: 10px;
            width: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            border-right: 4px solid #fb873f;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card i {
            font-size: 40px;
            color: #fb873f;
        }
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .search-input {
            border-radius: 50px;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
        }
        .search-input:focus {
            border-color: #fb873f;
            box-shadow: none;
        }
        .btn-orange {
            background: #fb873f;
            color: white;
            border-radius: 10px;
        }
        .btn-orange:hover {
            background: #e0762e;
            color: white;
        }
        .btn-home {
            background: #10b981;
            color: white;
            border-radius: 10px;
        }
        .btn-home:hover {
            background: #059669;
            color: white;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 18px;
            cursor: pointer;
        }
        .delete-btn:hover {
            color: #dc2626;
        }
        .edit-btn {
            background: none;
            border: none;
            color: #3b82f6;
            font-size: 18px;
            cursor: pointer;
            margin-left: 8px;
        }
        .modal-content {
            border-radius: 20px;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
        }
        .logo-text span {
            color: #fb873f;
        }
        .progress {
            height: 8px;
            border-radius: 10px;
        }
        .progress-bar {
            background: #fb873f;
            border-radius: 10px;
        }
        .badge-enrolled {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .course-badge {
            background: #e2e8f0;
            color: #1e293b;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            margin: 2px;
            display: inline-block;
        }
        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <div class="text-center mb-4 pt-3">
                <h3 class="logo-text text-white" style="direction: ltr;"> <span> المنصة </span></h3>
                <p class="text-white-50 small">لوحة التحكم</p>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" data-tab="dashboard" href="#">
                        <i class="fas fa-chart-line"></i> لوحة التحكم
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-tab="users" href="#">
                        <i class="fas fa-users"></i> المستخدمين
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-tab="teachers" href="#">
                        <i class="fas fa-chalkboard-user"></i> المدرسين
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-tab="messages" href="#">
                        <i class="fas fa-envelope"></i> الرسائل
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-tab="enrollments" href="#">
                        <i class="fas fa-graduation-cap"></i> المسجلين في الكورسات
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="pageTitle">لوحة التحكم</h2>
                <div>
                    <button class="btn btn-home me-2" id="homeBtn">
                        <i class="fas fa-home"></i> الرئيسية
                    </button>
                    <button class="btn btn-orange" data-bs-toggle="modal" data-bs-target="#addModal" id="addBtn">
                        <i class="fas fa-plus"></i> إضافة جديد
                    </button>
                    <button class="btn btn-danger ms-2" id="logoutBtn" style="background: #dc2626; border: none;">
                        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                    </button>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="row mb-4" id="statsRow">
                <div class="col-md-3 mb-3">
                    <div class="stat-card text-center">
                        <i class="fas fa-user-graduate"></i>
                        <h3 class="mt-2" id="statUsers">0</h3>
                        <p class="text-muted mb-0">إجمالي المستخدمين</p>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="stat-card text-center">
                        <i class="fas fa-chalkboard-user"></i>
                        <h3 class="mt-2" id="statTeachers">0</h3>
                        <p class="text-muted mb-0">إجمالي المدرسين</p>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="stat-card text-center">
                        <i class="fas fa-envelope"></i>
                        <h3 class="mt-2" id="statMessages">0</h3>
                        <p class="text-muted mb-0">الرسائل الواردة</p>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="stat-card text-center">
                        <i class="fas fa-graduation-cap"></i>
                        <h3 class="mt-2" id="statEnrollments">0</h3>
                        <p class="text-muted mb-0">إجمالي التسجيلات</p>
                    </div>
                </div>
            </div>

            <!-- Search Box -->
            <div class="mb-3">
                <input type="text" id="searchInput" class="form-control search-input" placeholder="🔍 بحث...">
            </div>

            <!-- Table Container -->
            <div class="table-container">
                <div id="tableContent"></div>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: #fb873f; color: white;">
                <h5 class="modal-title" id="modalTitle">إضافة مستخدم جديد</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addForm">
                    <input type="hidden" id="itemId">
                    <div class="mb-3">
                        <label class="form-label">الاسم</label>
                        <input type="text" class="form-control" id="itemName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="itemEmail" required>
                    </div>
                    <div id="extraFields"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-orange" id="saveBtn">حفظ</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
